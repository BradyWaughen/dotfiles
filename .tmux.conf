# ~/.tmux.conf

# --- General ---
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1

# --- Status bar ---
set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=default"

# Left: [HH:MM:SS] >> session
set -g status-left-length 40
set -g status-left "#[fg=colour240][#[fg=colour240]%H:%M:%S#[fg=colour240]] #[fg=colour204]>>#[fg=colour141] #S #[default]"

# Right: hostname
set -g status-right-length 30
set -g status-right "#[fg=colour240]#H"

# Window list (center)
set -g status-justify left
setw -g window-status-format         "#[fg=colour240] #I:#W "
setw -g window-status-current-format "#[fg=colour39] #I:#[fg=colour204]#W#[fg=colour214]* "

# --- Pane borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour204"

# --- Mouse ---
set -g mouse on

# --- Keybinds ---
# Remap prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
