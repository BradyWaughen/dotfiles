# ~/.tmux.conf — Tokyo Night (portable, no plugins or patched fonts)
# ============================================================
 
# --- General ---
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on
 
# --- Mouse ---
set -g mouse on
 
# --- Keybinds ---
# Remap prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
 
# Split panes with | and - (inherit current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
 
# New window inherits current path
bind c new-window -c "#{pane_current_path}"
 
# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
 
# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
 
# Swap panes
bind > swap-pane -D
bind < swap-pane -U
 
# Quick window switching
bind -r p previous-window
bind -r n next-window
 
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
 
# Synchronize panes toggle (type in all panes at once)
bind S setw synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"
 
# Popup scratch terminal (tmux 3.2+)
bind ` display-popup -E -w 80% -h 70% -d "#{pane_current_path}"
 
# --- Vi Copy Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
 
# --- Tokyo Night Palette ---
#   bg       #1a1b26    fg       #c0caf5
#   bg_dark  #16161e    blue     #7aa2f7
#   bg_hl    #24283b    green    #9ece6a
#   comment  #565f89    cyan     #7dcfff
#   dark3    #3b4261    magenta  #bb9af7
#   red      #f7768e    orange   #ff9e64
 
# --- Status Bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-justify left
 
# Left: [session] path
set -g status-left-length 50
set -g status-left "\
#[bg=#7aa2f7,fg=#1a1b26,bold] #S \
#[bg=#24283b,fg=#a9b1d6] #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\") \
#[bg=#1a1b26,fg=#24283b] "
 
# Right: sync indicator | uptime | clock
set -g status-right-length 60
set -g status-right "\
#{?synchronize-panes,#[bg=#f7768e#,fg=#1a1b26#,bold] SYNC #[default] ,}\
#[fg=#565f89]up #(awk '{d=int($1/86400);h=int($1%86400/3600);printf \"%dd %dh\"#,d#,h}' /proc/uptime) \
#[fg=#3b4261]| \
#[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M "
 
# Window tabs
setw -g window-status-format         "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#c0caf5] #I:#[fg=#9ece6a,bold]#W#[fg=#ff9e64]* "
setw -g window-status-separator      ""
 
# Activity
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#ff9e64,none"
 
# --- Pane Borders ---
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
 
# --- Pane Number Display ---
set -g display-panes-active-colour "#7aa2f7"
set -g display-panes-colour "#3b4261"
set -g display-panes-time 2000
 
# --- Messages & Command Prompt ---
set -g message-style "bg=#24283b,fg=#c0caf5"
set -g message-command-style "bg=#24283b,fg=#c0caf5"
 
# --- Clock ---
setw -g clock-mode-colour "#7aa2f7"
 
# --- Mode (selection highlight) ---
setw -g mode-style "bg=#3b4261,fg=#c0caf5"
